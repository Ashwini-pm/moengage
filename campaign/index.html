<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"
    />
    <title>Semester Feedback Form</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&amp;display=swap"
      rel="stylesheet"
    />

    <script>
      window.MOE_CONFIG = {
        /* Student user id. For a quick test use a fixed value like "2935954".
           For all students, insert the user-id attribute here via the @ picker. */
        userId: "{{UserAttribute['user_id']|default('UNKNOWN')}}",

        /* Google Apps Script web-app URL (ends in /exec) */
        sheetWebhookUrl: "https://script.google.com/macros/s/AKfycbwFBHw1YCrcVcHRTjJm1a-GMc_z-Dw0pU0EdVK02pg8Czb8Pw4nq_vx9P2J7Gwm0BctIg/exec",

        /* Term identifier — stamped on every event and Sheet row */
        term: "sem_8",

        /* Start-screen copy */
        startTitle: "Hurray!",
        startLine1: "Your semester is complete",
        startLine2: "Tell us about your experience!"
      };

      /* Delivery beacon — fires the instant this HTML opens on a device */
      try {
        fetch(window.MOE_CONFIG.sheetWebhookUrl, {
          method: "POST",
          mode: "no-cors",
          keepalive: true,
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            type: "html_loaded",
            user_id: String(window.MOE_CONFIG.userId || "unknown"),
            term: window.MOE_CONFIG.term,
            device: (navigator.userAgent || "").slice(0, 200),
            client_ts: new Date().toISOString()
          })
        });
      } catch (e) {}
    </script>

    <!-- feedback_v3.js is uploaded as a campaign asset; replace src with the
         CDN URL MoEngage gives you after upload. -->
    <script defer src="https://campaign-assets-03.moengage.com/inbound/inapp/html_inapp/campaigns/Sunstone/1780915265951193_fsuf8g/1780915265952127_makmd8/assets/1780915940880618_ohb/feedback_v3.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
